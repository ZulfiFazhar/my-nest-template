version: '3.8'

services:
  postgres-test:
    image: postgres:16-alpine
    container_name: my-nest-template-db-test
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=myid_test_db
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d myid_test_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  app-test:
    build:
      context: .
      target: development
    container_name: my-nest-template-app-test
    environment:
      - NODE_ENV=test
      - PORT=3000
      - DATABASE_HOST=postgres-test
      - DATABASE_PORT=5432
      - DATABASE_USERNAME=postgres
      - DATABASE_PASSWORD=postgres
      - DATABASE_NAME=myid_test_db
      - JWT_ACCESS_SECRET=test-secret-key
      - JWT_ACCESS_EXPIRES_IN=15m
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
    depends_on:
      postgres-test:
        condition: service_healthy
    command: ["npm", "run", "test:e2e"]

networks:
  default:
    driver: bridge
